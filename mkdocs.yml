site_name: ZinjaI Community Documentation
site_description: Unified documentation system for ZinjaI (User, Developer, API)
site_author: ZinjaI Community
site_url: https://yuedegan.github.io/ZinjaI-Community/

repo_name: ZinjaI-Community
repo_url: https://github.com/YueDegan/ZinjaI-Community

# -----------------------------
# Navigation structure
# -----------------------------
nav:
  - Home: index.md

  - User Manual:
      - Overview: user/index.md

  - Developer Manual:
      - HOME: developer/index.md
      - DIRECTORY:
          - autocomp: developer/autocomp/index.md
          - colours: developer/colours/index.md
          - complements: developer/complements/index.md
          - configs: developer/configs/index.md
          - cppreference: developer/cppreference/index.md
          - docs: developer/docs/docs.md
          - guihelp: developer/guihelp/index.md
          - imgs: developer/imgs/index.md
          - lang: developer/lang/index.md
          - parser: developer/parser/index.md
          - samples: developer/samples/index.md
          - skins: developer/skins/index.md
          - templates: developer/templates/index.md
          - third: developer/third/index.md
          - toolchains: developer/toolchains/index.md
      - SRC:
          - src: developer/src/index.md
          - src_extras: developer/src_extras/index.md
      - GIT:
          - .gitignore: developer/git/gitignore.md
          - .gitattributes: developer/git/gitattributes.md
      - BUILD:
          - compiling: developer/build/compiling.md
          - makefile: developer/build/makefile.md
      - PROJECT:
          - mkdocs.yml: developer/project/mkdocs.md
          - Doxyfile: developer/project/doxyfile.md
          - zinjai.dir: developer/project/zinjai_dir.md
          - requeriments.txt: developer/primary/requirements.md
      - DOCS MIST:
          - encoding_report: developer/docs_misc/encoding_report.md
      - ROOT DOCS:
          - README: developer/root_docs/readme.md
          - readme_txt: developer/root_docs/readme_txt.md
          - LICENSE: developer/root_docs/license.md

  - API Reference:
      - Doxygen: api/index.html

# -----------------------------
# Theme configuration
# -----------------------------
theme:
  name: material
  language: es

  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue
      accent: light blue

    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: blue
      accent: cyan

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

# -----------------------------
# Plugins
# -----------------------------
plugins:
  - search

# -----------------------------
# Markdown extensions
# -----------------------------
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: false
      pygments_lang_class: true
      guess_lang: false
  - pymdownx.escapeall:
      hardbreak: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# -----------------------------
# Extra settings
# -----------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YueDegan/ZinjaI-Community