site_name: ZinjaI Community Documentation
site_description: Unified documentation system for ZinjaI (User, Developer, API)
site_author: ZinjaI Community
site_url: https://github.com/YueDegan/

repo_name: ZinjaI-Community
repo_url: https://github.com/YueDegan/ZinjaI-Community

# -----------------------------
# Navigation structure
# -----------------------------
nav:
  - Home: index.md
  - User Manual:
      - Overview: user/index.md
  - Developer Manual:
      - Overview: developer/index.md
      - Autocomp: developer/autocomp/index.md
  - API Reference:
      - Doxygen: api/html/index.html

# -----------------------------
# Theme configuration
# -----------------------------
theme:
  name: material
  language: es

  palette:
    # Light mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: blue
      accent: light blue

    # Dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: blue
      accent: cyan

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

# -----------------------------
# Plugins
# -----------------------------
plugins:
  - search
  - mkdocstrings

# -----------------------------
# Markdown extensions
# -----------------------------
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# -----------------------------
# Extra settings
# -----------------------------
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YueDegan/ZinjaI-Community

  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js