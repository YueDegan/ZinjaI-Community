name: Deploy static content to Pages

on:
  push:
    branches: ["community"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # Checkout
      # -------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Install system deps
      # -------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # -------------------------
      # Setup Python
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # Install MkDocs
      # -------------------------
      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material mkdocstrings

      # -------------------------
      # Build Doxygen
      # -------------------------
      - name: Run Doxygen
        run: doxygen Doxyfile

      # -------------------------
      # Build MkDocs (IMPORTANT FIX)
      # -------------------------
      - name: Build MkDocs
        run: mkdocs build -f mkdocs.yml --site-dir site

      # -------------------------
      # VERIFY OUTPUT (CRITICAL DEBUG)
      # -------------------------
      - name: Verify site output
        run: |
          ls -R site

      # -------------------------
      # Upload artifact for Pages
      # -------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
